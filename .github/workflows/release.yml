name: Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true
        type: string
      release_target:
        description: Commit SHA or ref to build from
        required: true
        type: string
      release_notes:
        description: Release notes body
        required: false
        default: ''
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.event.pull_request.merge_commit_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'devel')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_tag: ${{ steps.release_metadata.outputs.release_tag }}
      release_target: ${{ steps.release_metadata.outputs.release_target }}
      release_notes: ${{ steps.release_metadata.outputs.release_notes }}

    steps:
      - name: Checkout release target
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_target || github.event.pull_request.merge_commit_sha }}

      - name: Setup Node.js
        if: github.event_name != 'workflow_dispatch'
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Resolve release metadata
        id: release_metadata
        shell: bash
        env:
          MANUAL_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          MANUAL_RELEASE_TARGET: ${{ github.event.inputs.release_target }}
          MANUAL_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=$MANUAL_RELEASE_TAG" >> "$GITHUB_OUTPUT"
            echo "release_target=$MANUAL_RELEASE_TARGET" >> "$GITHUB_OUTPUT"
            {
              echo 'release_notes<<EOF'
              printf '%s\n' "$MANUAL_RELEASE_NOTES"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=$(node -p 'require("./package.json").version' | tr -d '\n')" >> "$GITHUB_OUTPUT"
            echo "release_target=${{ github.event.pull_request.merge_commit_sha }}" >> "$GITHUB_OUTPUT"
            {
              echo 'release_notes<<EOF'
              echo ''
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

  sea:
    name: SEA Release (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_target }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Compute asset metadata
        id: meta
        shell: pwsh
        run: |
          $os = switch ($env:RUNNER_OS) {
            'Linux' { 'linux' }
            'macOS' { 'macos' }
            'Windows' { 'windows' }
            default { throw "Unsupported RUNNER_OS: $env:RUNNER_OS" }
          }
          $arch = $env:RUNNER_ARCH.ToLowerInvariant()

          "archive_suffix=$os-$arch" >> $env:GITHUB_OUTPUT

      - name: Build player SEA executable
        run: pnpm --filter @be-music/player run build:sea

      - name: Build audio-renderer SEA executable
        run: pnpm --filter @be-music/audio-renderer run build:sea

      - name: Sign Windows SEA executables
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_PASSWORD)) {
            throw 'WINDOWS_SIGNING_PFX_BASE64 and WINDOWS_SIGNING_PFX_PASSWORD secrets must be configured for release signing.'
          }

          $tag = '${{ needs.prepare.outputs.release_tag }}'
          $assetDir = 'tmp/release-assets'
          $signingDir = 'tmp/signing/windows'
          $pfxPath = Join-Path $signingDir 'be-music-self-signed-windows.pfx'
          $cerPath = Join-Path $assetDir "be-music-self-signed-windows-$tag.cer"

          New-Item -ItemType Directory -Force -Path $assetDir, $signingDir | Out-Null
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_PFX_BASE64))

          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_SIGNING_PFX_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfxPath -Password $securePassword -CertStoreLocation 'Cert:\CurrentUser\My'
          if (-not $certificate) {
            throw 'Failed to import the Windows signing certificate.'
          }

          Export-Certificate -Cert $certificate -FilePath $cerPath -Type CERT | Out-Null
          Import-Certificate -FilePath $cerPath -CertStoreLocation 'Cert:\CurrentUser\Root' | Out-Null
          Import-Certificate -FilePath $cerPath -CertStoreLocation 'Cert:\CurrentUser\TrustedPublisher' | Out-Null

          $signTool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if (-not $signTool) {
            $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
              Where-Object { $_.FullName -like '*\x64\signtool.exe' } |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $signTool) {
            throw 'signtool.exe was not found on the GitHub runner.'
          }

          $files = @(
            'packages/player/dist-sea/be-music-player.exe',
            'packages/audio-renderer/dist-sea/be-music-audio-render.exe'
          )

          foreach ($file in $files) {
            & $signTool sign /fd SHA256 /f $pfxPath /p $env:WINDOWS_SIGNING_PFX_PASSWORD $file
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to sign $file"
            }

            & $signTool verify /pa /v $file
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to verify the embedded signature for $file"
            }
          }

      - name: Sign macOS SEA executables
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_SIGNING_P12_BASE64: ${{ secrets.MACOS_SIGNING_P12_BASE64 }}
          MACOS_SIGNING_P12_PASSWORD: ${{ secrets.MACOS_SIGNING_P12_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_SIGNING_P12_BASE64:-}" ] || [ -z "${MACOS_SIGNING_P12_PASSWORD:-}" ]; then
            echo "MACOS_SIGNING_P12_BASE64 and MACOS_SIGNING_P12_PASSWORD secrets must be configured for release signing." >&2
            exit 1
          fi

          tag="${{ needs.prepare.outputs.release_tag }}"
          asset_dir="tmp/release-assets"
          signing_dir="tmp/signing/macos"
          keychain_path="$RUNNER_TEMP/be-music-signing.keychain-db"
          keychain_password="$(openssl rand -hex 16)"
          pkcs12_legacy_flag=''
          rsa_traditional_cmd=''

          mkdir -p "$asset_dir" "$signing_dir"
          if openssl pkcs12 -help 2>&1 | grep -q -- ' -legacy '; then
            pkcs12_legacy_flag='-legacy'
          fi
          if openssl pkey -help 2>&1 | grep -q -- ' -traditional '; then
            rsa_traditional_cmd='openssl pkey -traditional'
          elif openssl rsa -help 2>&1 | grep -q -- ' -traditional '; then
            rsa_traditional_cmd='openssl rsa -traditional'
          else
            echo "The available OpenSSL build cannot export a traditional RSA key for macOS signing." >&2
            exit 1
          fi
          printf '%s' "$MACOS_SIGNING_P12_BASE64" | base64 -D >"$signing_dir/self-signed.p12"
          openssl pkcs12 \
            ${pkcs12_legacy_flag:+$pkcs12_legacy_flag} \
            -in "$signing_dir/self-signed.p12" \
            -clcerts \
            -nokeys \
            -passin "pass:$MACOS_SIGNING_P12_PASSWORD" |
            openssl x509 -out "$asset_dir/be-music-self-signed-macos-$tag.pem"
          openssl pkcs12 \
            ${pkcs12_legacy_flag:+$pkcs12_legacy_flag} \
            -in "$signing_dir/self-signed.p12" \
            -nocerts \
            -nodes \
            -out "$signing_dir/self-signed.key.pem" \
            -passin "pass:$MACOS_SIGNING_P12_PASSWORD"
          $rsa_traditional_cmd \
            -in "$signing_dir/self-signed.key.pem" \
            -out "$signing_dir/self-signed.key.rsa"
          openssl pkcs12 \
            ${pkcs12_legacy_flag:+$pkcs12_legacy_flag} \
            -in "$signing_dir/self-signed.p12" \
            -clcerts \
            -nokeys \
            -out "$signing_dir/self-signed.cert.pem" \
            -passin "pass:$MACOS_SIGNING_P12_PASSWORD"

          certtool i "$signing_dir/self-signed.cert.pem" k="$keychain_path" r="$signing_dir/self-signed.key.rsa" c p="$keychain_password" >/dev/null
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"

          identity="$(security find-certificate -a -Z "$keychain_path" | awk '/SHA-1 hash:/ { print $3; exit }')"
          if [ -z "$identity" ]; then
            echo "Failed to find the imported macOS signing certificate." >&2
            exit 1
          fi

          files=(
            packages/player/dist-sea/be-music-player
            packages/audio-renderer/dist-sea/be-music-audio-render
          )

          for file in "${files[@]}"; do
            codesign --force --sign "$identity" --keychain "$keychain_path" "$file"
            codesign --verify --strict --verbose=2 "$file"
          done

      - name: Package SEA archives (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.release_tag }}"
          suffix="${{ steps.meta.outputs.archive_suffix }}"

          mkdir -p tmp/release-assets/player tmp/release-assets/audio-renderer
          cp packages/player/dist-sea/be-music-player tmp/release-assets/player/
          cp packages/audio-renderer/dist-sea/be-music-audio-render tmp/release-assets/audio-renderer/
          chmod +x tmp/release-assets/player/be-music-player
          chmod +x tmp/release-assets/audio-renderer/be-music-audio-render

          (
            cd tmp/release-assets/player
            zip -9 -q "../be-music-player-${tag}-${suffix}.zip" be-music-player
          )

          (
            cd tmp/release-assets/audio-renderer
            zip -9 -q "../be-music-audio-render-${tag}-${suffix}.zip" be-music-audio-render
          )

      - name: Package SEA archives (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = '${{ needs.prepare.outputs.release_tag }}'
          $suffix = '${{ steps.meta.outputs.archive_suffix }}'
          $assetDir = 'tmp/release-assets'

          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          Compress-Archive -Path 'packages/player/dist-sea/be-music-player.exe' -DestinationPath "$assetDir/be-music-player-$tag-$suffix.zip" -CompressionLevel Optimal -Force
          Compress-Archive -Path 'packages/audio-renderer/dist-sea/be-music-audio-render.exe' -DestinationPath "$assetDir/be-music-audio-render-$tag-$suffix.zip" -CompressionLevel Optimal -Force

      - name: Upload SEA archives
        uses: actions/upload-artifact@v7
        with:
          name: sea-release-assets-${{ steps.meta.outputs.archive_suffix }}
          path: tmp/release-assets/*
          if-no-files-found: error

  publish:
    name: Publish Release
    needs:
      - prepare
      - sea
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download SEA archives
        uses: actions/download-artifact@v5
        with:
          pattern: sea-release-assets-*
          merge-multiple: true
          path: tmp/release-assets

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_TARGET: ${{ needs.prepare.outputs.release_target }}
          RELEASE_NOTES: ${{ needs.prepare.outputs.release_notes }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find tmp/release-assets -maxdepth 1 -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found to upload." >&2
            exit 1
          fi

          if ! printf '%s\n' "${assets[@]}" | grep -q '\.zip$'; then
            echo "SEA archives are missing from tmp/release-assets." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
            if [ -n "$RELEASE_NOTES" ]; then
              gh release edit "$RELEASE_TAG" --notes "$RELEASE_NOTES" --repo "$GITHUB_REPOSITORY"
            fi
          else
            create_args=(
              "$RELEASE_TAG"
              "${assets[@]}"
              --repo "$GITHUB_REPOSITORY"
              --target "$RELEASE_TARGET"
              --title "$RELEASE_TAG"
            )

            if [ -n "$RELEASE_NOTES" ]; then
              create_args+=(--notes "$RELEASE_NOTES")
            else
              create_args+=(--generate-notes)
            fi

            gh release create "${create_args[@]}"
          fi
