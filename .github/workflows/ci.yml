name: CI

on:
  push:
    branches:
      - devel
      - main
  pull_request:
    branches:
      - devel
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
      player_changed: ${{ steps.filter.outputs.player }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
            player:
              - 'packages/player/**'
              - 'packages/audio-renderer/**'
              - 'packages/parser/**'
              - 'packages/json/**'
              - 'packages/utils/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.node-version'
              - 'tsconfig*.json'
              - 'packages/*/tsconfig*.json'

  verify:
    name: Verify (${{ matrix.task }})
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        task:
          - lint
          - typecheck
          - build
          - test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Fetch dependencies
        run: pnpm fetch --frozen-lockfile

      - name: Install dependencies (offline)
        run: pnpm install --frozen-lockfile --offline

      - name: Run ${{ matrix.task }}
        run: pnpm run ${{ matrix.task }}

  sea:
    name: SEA (${{ matrix.os }})
    needs: changes
    if: github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.player_changed == 'true')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Fetch dependencies
        run: pnpm fetch --frozen-lockfile

      - name: Install dependencies (offline)
        run: pnpm install --frozen-lockfile --offline

      - name: Build SEA executable
        run: pnpm --filter @be-music/player run build:sea

      - name: Select SEA binary path
        id: sea-binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "path=packages/player/dist-sea/be-music-player.exe" >> "$GITHUB_OUTPUT"
          else
            echo "path=packages/player/dist-sea/be-music-player" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SEA artifact
        uses: actions/upload-artifact@v4
        with:
          name: be-music-player-${{ runner.os }}-${{ runner.arch }}
          path: ${{ steps.sea-binary.outputs.path }}
          if-no-files-found: error
